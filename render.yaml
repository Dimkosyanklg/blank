services:
  - type: web
    name: go-bff
    runtime: node
    rootDir: bff
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: GO_ENV
        value: production
      - key: CORS_ALLOWED_ORIGIN
        sync: false

  - type: web
    name: react-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run preview -- --host 0.0.0.0 --port $PORT
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
